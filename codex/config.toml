model = "gpt-5.5"
sandbox = "workspace-write"
model_reasoning_effort = "high"

[features]
hooks = true

[tui]
notifications = ["agent-turn-complete", "approval-requested", "plan-mode-prompt"]
notification_method = "osc9"
notification_condition = "unfocused"

[approval]
auto_approve = ["read_file", "list_directory", "grep", "glob", "shell:ls*", "shell:cat*", "shell:head*", "shell:tail*", "shell:grep*", "shell:rg*", "shell:find*", "shell:fd*", "shell:git log*", "shell:git diff*", "shell:git status*", "shell:git show*", "shell:git branch*", "shell:work *"]
suggest = ["shell:curl*", "shell:git push*", "shell:git pull*", "shell:git merge*", "shell:git rebase*", "shell:git checkout*"]
deny = ["shell:git reset --hard*", "shell:git clean -f*", "shell:rm -rf /*", "shell:sudo*"]

[projects."~/stripe/work"]
trust_level = "trusted"

[projects."~/.dotfiles"]
trust_level = "trusted"

[projects."~/stripe/mint"]
trust_level = "trusted"

[marketplaces.stripe-internal-marketplace]
last_updated = "2026-05-28T17:49:49Z"
source_type = "git"
source = "http://codex-marketplace--northwest.corp.stripe.com.certproxy.localhost:7891/codex-marketplace.git"

[mcp_servers.toolshed_slack]
command = "pay"
args = ["toolshed", "serve", "slack"]

[mcp_servers.google_drive]
command = "pay"
args = ["toolshed", "serve", "google_drive"]

[mcp_servers.toolshed_google_drive_append_to_google_drive_doc_commen--_008829]
command = "sh"
args = ["-lc", "exec \"$HOME/stripe/mint/gocode/.cursor/toolshed_stdio_shim.sh\" \"$@\"", "toolshed_stdio_shim", "google_drive.append_to_google_drive_doc.comment_on_google_drive_doc.create_google_drive_doc.create_google_drive_doc_tab.format_google_drive_doc.get_google_drive_doc_revision.get_google_drive_doc_tab_contents.get_google_drive_file.get_google_drive_file_comments.get_google_drive_file_name.list_google_drive_doc_revisions.list_google_drive_doc_tabs.reply_to_google_drive_comment.search_google_drive.update_google_drive_doc"]
